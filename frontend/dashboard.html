<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark p-3">

<div class="container-fluid">

<span class="navbar-brand">Job Portal Dashboard</span>

<button class="btn btn-danger" onclick="logout()">Logout</button>

</div>

</nav>

<!-- Main Dashboard -->

<div class="container mt-5">

<h2 class="mb-4">Welcome to Job Portal</h2>

<!-- Job Statistics -->

<h4>Total Jobs Available: <span id="jobCount">0</span></h4>

<div class="row mt-4">

<div class="col-md-4">

<div class="card text-center p-4 shadow">

<h4>Post Job</h4>

<p>Add new job openings</p>

<a href="postjob.html" class="btn btn-primary">Post Job</a>

</div>

</div>

<div class="col-md-4">

<div class="card text-center p-4 shadow">

<h4>View Jobs</h4>

<p>See available job listings</p>

<a href="jobs.html" class="btn btn-success">View Jobs</a>

</div>

</div>

<div class="col-md-4">

<div class="card text-center p-4 shadow">

<h4>Apply Jobs</h4>

<p>Browse and apply jobs</p>

<a href="jobs.html" class="btn btn-warning">Browse Jobs</a>

</div>

</div>

</div>

</div>

<script>

function logout(){

alert("Logged out successfully");

window.location.href = "login.html";

}

/* Job Count */

fetch("http://localhost:5000/jobcount")
.then(res=>res.json())
.then(data=>{
document.getElementById("jobCount").innerText = data.total;
});

</script>

</body>
</html>
