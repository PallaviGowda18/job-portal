<!DOCTYPE html>
<html>
<head>
<title>Available Jobs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark p-3">

<div class="container-fluid">

<a class="navbar-brand" href="dashboard.html">Job Portal</a>

<div>

<a class="btn btn-light me-2" href="dashboard.html">Dashboard</a>

<a class="btn btn-success me-2" href="postjob.html">Post Job</a>

<a class="btn btn-danger" href="login.html">Logout</a>

</div>

</div>

</nav>

<!-- Page Content -->

<div class="container mt-5">

<h2 class="mb-4">Available Jobs</h2>

<input class="form-control mb-4" type="text" id="search" placeholder="Search job title">

<div id="jobs"></div>

</div>

<script>

function loadJobs(){

fetch("http://localhost:5000/jobs")
.then(res=>res.json())
.then(data=>{

let output="";

data.forEach(job=>{

output += `
<div class="card mb-3 shadow">
<div class="card-body">

<h4 class="card-title">${job.title}</h4>

<p class="card-text"><b>Company:</b> ${job.company}</p>

<p class="card-text"><b>Location:</b> ${job.location}</p>

<button class="btn btn-primary" onclick="applyJob('${job.title}')">Apply Job</button>

</div>
</div>
`;

});

document.getElementById("jobs").innerHTML = output;

});

}

function applyJob(title){

alert("Application submitted for " + title);

}

loadJobs();

</script>

</body>
</html>
