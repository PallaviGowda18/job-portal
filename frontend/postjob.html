<!DOCTYPE html>
<html>
<head>
<title>Post Job</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2 class="mb-4">Post Job</h2>

<input class="form-control mb-3" type="text" id="title" placeholder="Job Title">

<input class="form-control mb-3" type="text" id="company" placeholder="Company Name">

<input class="form-control mb-3" type="text" id="location" placeholder="Location">

<button class="btn btn-primary" onclick="addJob()">Post Job</button>

<script>

function addJob(){

const title = document.getElementById("title").value;
const company = document.getElementById("company").value;
const location = document.getElementById("location").value;

fetch("http://localhost:5000/addjob",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({title,company,location})

})
.then(res=>res.text())
.then(data=>alert(data));

}

</script>

</body>
</html>
